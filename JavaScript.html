<script>

function analyzePortfolio() {

  const p1 =
    document.getElementById(
      'portfolio1'
    );

  const p2 =
    document.getElementById(
      'portfolio2'
    );

  const screener =
    document.getElementById(
      'screener'
    ).value;

  if(
    !p1.files.length ||
    !p2.files.length
  ){
    alert(
      'Upload both CSV files'
    );
    return;
  }

  const reader1 =
    new FileReader();

  reader1.onload =
  function(e1){

    const csv1 =
      e1.target.result;

    const reader2 =
      new FileReader();

    reader2.onload =
    function(e2){

      const csv2 =
        e2.target.result;

      google.script.run
        .withSuccessHandler(
          function(html){

            document
              .getElementById(
                'result'
              )
              .innerHTML =
              html;

          }
        )
        .processPortfolio(
          csv1,
          csv2,
          screener
        );

    };

    reader2.readAsText(
      p2.files[0]
    );

  };

  reader1.readAsText(
    p1.files[0]
  );

}

function analyzeDatabase() {

  google.script.run
    .withSuccessHandler(
      function(html){

        document
          .getElementById(
            'result'
          )
          .innerHTML =
          html;

      }
    )
    .analyzeExistingDatabase();

}

</script>
